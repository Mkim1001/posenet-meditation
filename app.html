<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 명상 가이드 — 나온 명상</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .app-page { background: #0a0a1a; min-height: 100vh; }
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      background: rgba(10,10,26,.95);
      border-bottom: 1px solid rgba(255,255,255,.08);
      position: sticky; top: 0; z-index: 50;
    }
    .app-header a { color: #a78bfa; font-size: 14px; font-weight: 600; }
    .app-header a:hover { color: #c4b5fd; }
    .app-frame-wrap {
      width: 100%; height: calc(100vh - 58px);
      position: relative;
    }
    .app-frame-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }
  </style>
</head>
<body class="app-page">
  <div class="app-header">
    <a href="index.html">← 나온 명상 홈</a>
    <svg viewBox="0 0 260 70" width="100" height="27" aria-label="나온 명상">
      <text x="2"  y="54" class="logo-green" style="font-size:42px">나</text>
      <text x="56" y="54" class="logo-green" style="font-size:42px">온</text>
      <text x="130" y="54" class="logo-amber" style="font-size:42px">명</text>
      <text x="186" y="54" class="logo-amber" style="font-size:42px">상</text>
    </svg>
    <span style="font-size:13px; color:rgba(167,139,250,.6);">AI 명상 가이드</span>
  </div>
  <div class="app-frame-wrap">
    <iframe src="../meditation/sketch.html" allow="camera; microphone" title="PoseNet 차크라 명상"></iframe>
  </div>
</body>
</html>
