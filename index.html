<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명상 가이드 - Jamystrology</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a1a; overflow: hidden; }
    #canvas-container { position: relative; width: 100vw; height: 100vh; }
    #status-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #a78bfa;
      font-family: 'Georgia', serif;
      pointer-events: none;
      z-index: 10;
    }
    #status-overlay h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    #status-overlay p { font-size: 0.9rem; color: #c4b5fd; }
    #loading-spinner {
      width: 50px; height: 50px;
      border: 3px solid #2d1b69;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #back-btn {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: rgba(124, 58, 237, 0.3);
      color: #c4b5fd;
      border: 1px solid #7c3aed;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      z-index: 20;
      text-decoration: none;
      font-family: sans-serif;
    }
    #back-btn:hover { background: rgba(124, 58, 237, 0.5); }
    #timer-display {
      position: absolute;
      top: 1rem;
      right: 1rem;
      color: #a78bfa;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      z-index: 20;
      text-align: right;
    }
    #chakra-legend {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chakra-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #c4b5fd;
      font-family: sans-serif;
      font-size: 0.72rem;
    }
    .chakra-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <a id="back-btn" href="/">← 홈으로</a>
  <div id="timer-display">
    <div id="session-timer">00:00</div>
    <div id="pose-status" style="font-size:0.75rem; color:#7c3aed; margin-top:2px;"></div>
  </div>
  <div id="chakra-legend">
    <div class="chakra-item"><div class="chakra-dot" style="background:#9b59b6"></div>왕관 차크라</div>
    <div class="chakra-item"><div class="chakra-dot" style="background:#4b6cb7"></div>제3의 눈</div>
    <div class="chakra-item"><div class="chakra-dot" style="background:#00bcd4"></div>목 차크라</div>
    <div class="chakra-item"><div class="chakra-dot" style="background:#4caf50"></div>심장 차크라</div>
    <div class="chakra-item"><div class="chakra-dot" style="background:#ffeb3b"></div>태양신경총</div>
    <div class="chakra-item"><div class="chakra-dot" style="background:#ff9800"></div>천골 차크라</div>
    <div class="chakra-item"><div class="chakra-dot" style="background:#f44336"></div>근원 차크라</div>
  </div>
  <div id="canvas-container"></div>
  <div id="status-overlay">
    <div id="loading-spinner"></div>
    <h2>AI 명상 가이드 로딩 중</h2>
    <p>카메라와 포즈 감지 모델을 초기화하고 있습니다...</p>
  </div>

<script>
// ─── Chakra definitions ───────────────────────────────────────────────
const CHAKRAS = [
  { name: '왕관', color: [155, 89, 182], glow: [200, 130, 255] },
  { name: '제3의 눈', color: [75, 108, 183], glow: [100, 150, 255] },
  { name: '목', color: [0, 188, 212], glow: [100, 220, 255] },
  { name: '심장', color: [76, 175, 80], glow: [100, 255, 130] },
  { name: '태양신경총', color: [255, 235, 59], glow: [255, 245, 150] },
  { name: '천골', color: [255, 152, 0], glow: [255, 180, 80] },
  { name: '근원', color: [244, 67, 54], glow: [255, 100, 80] },
];

// ─── Global state ─────────────────────────────────────────────────────
let video, poseNet, pose = null;
let modelReady = false;
let particles = [];
let breathPhase = 0;
let breathIn = true;
let sessionStart = Date.now();
let meditationScore = 0;
let bgStars = [];
// Per-chakra smooth activation (0–1 each)
let chakraActivations = [0, 0, 0, 0, 0, 0, 0];
// Smooth alignment scores for UI feedback
let smoothShoulder = 0, smoothSpine = 0, smoothHip = 0;
let smoothShoulderTilt = 0, smoothSpineLean = 0;

// ─── p5.js sketch ─────────────────────────────────────────────────────
const sketch = (p) => {

  p.setup = () => {
    const cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent('canvas-container');
    p.colorMode(p.RGB, 255, 255, 255, 255);
    p.noStroke();

    // Create background stars
    for (let i = 0; i < 180; i++) {
      bgStars.push({
        x: p.random(p.width),
        y: p.random(p.height),
        r: p.random(0.5, 2.5),
        twinkle: p.random(p.TWO_PI),
      });
    }

    // Start webcam
    video = p.createCapture(p.VIDEO);
    video.size(640, 480);
    video.hide();

    // Load PoseNet via ml5
    const options = { imageScaleFactor: 0.4, outputStride: 16, flipHorizontal: true, minConfidence: 0.4 };
    poseNet = ml5.poseNet(video, options, () => {
      modelReady = true;
      document.getElementById('status-overlay').style.display = 'none';
    });
    poseNet.on('pose', (results) => {
      pose = results.length > 0 ? results[0].pose : null;
    });
  };

  p.windowResized = () => {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };

  p.draw = () => {
    // Dark cosmic background
    p.background(8, 8, 22);

    // Draw stars
    drawStars(p);

    // Breathing cycle (~8s per full cycle)
    breathPhase += breathIn ? 0.003 : 0.003;
    if (breathPhase >= 1) { breathPhase = 1; breathIn = false; }
    if (breathPhase <= 0 && !breathIn) { breathPhase = 0; breathIn = true; }

    // Update timer
    updateTimer();

    // Draw video feed (mirrored, dark overlay)
    drawVideo(p);

    if (!modelReady) return;

    if (pose) {
      const chakraPositions = getChakraPositions(pose, p);

      // Per-chakra alignment scores
      const align = getAlignmentScores(pose);

      // Smooth all scores
      for (let i = 0; i < 7; i++)
        chakraActivations[i] = chakraActivations[i] * 0.93 + align.chakraScores[i] * 0.07;
      smoothShoulder  = smoothShoulder  * 0.93 + align.shoulderScore  * 0.07;
      smoothSpine     = smoothSpine     * 0.93 + align.spineScore     * 0.07;
      smoothHip       = smoothHip       * 0.93 + align.hipScore       * 0.07;
      smoothShoulderTilt = smoothShoulderTilt * 0.85 + align.shoulderTilt * 0.15;
      smoothSpineLean    = smoothSpineLean    * 0.85 + align.spineLean    * 0.15;

      meditationScore = chakraActivations.reduce((a, b) => a + b, 0) / 7;

      // Draw layers
      drawAura(p, pose, meditationScore);
      drawAlignmentGuides(p, pose, align);
      drawSkeleton(p, pose);
      emitParticles(p, chakraPositions);
      drawChakras(p, chakraPositions);

      // Status feedback
      updatePoseStatus(align);
    } else {
      document.getElementById('pose-status').textContent = '📷 몸 전체가 보이도록 앉아주세요';
    }

    updateParticles(p);
    drawBreathingGuide(p);
  };

  // ─── Draw background stars ───────────────────────────────────────
  function drawStars(p) {
    for (const s of bgStars) {
      s.twinkle += 0.02;
      const alpha = 100 + 80 * Math.sin(s.twinkle);
      p.fill(180, 160, 255, alpha);
      p.ellipse(s.x, s.y, s.r * 2, s.r * 2);
    }
  }

  // ─── Draw semi-transparent video feed ───────────────────────────
  function drawVideo(p) {
    if (!video || !video.elt) return;
    const vw = p.width, vh = p.height;
    p.push();
    p.translate(vw, 0);
    p.scale(-1, 1);
    p.tint(255, 55); // Very subtle
    p.image(video, 0, 0, vw, vh);
    p.noTint();
    p.pop();
  }

  // ─── Map PoseNet keypoints to chakra positions ───────────────────
  function mapPt(kp, p) {
    // PoseNet coords in video space (640x480), map to canvas
    const scaleX = p.width / 640;
    const scaleY = p.height / 480;
    // Mirror horizontally
    return {
      x: p.width - kp.x * scaleX,
      y: kp.y * scaleY,
      confidence: kp.confidence,
    };
  }

  function getChakraPositions(pose, p) {
    const kp = {};
    for (const k of pose.keypoints) kp[k.part] = k.position;

    const nose = mapPt({ x: kp.nose?.x || 320, y: kp.nose?.y || 100, confidence: kp.nose ? 1 : 0 }, p);
    const lShoulder = mapPt({ x: kp.leftShoulder?.x || 250, y: kp.leftShoulder?.y || 200, confidence: 0 }, p);
    const rShoulder = mapPt({ x: kp.rightShoulder?.x || 390, y: kp.rightShoulder?.y || 200, confidence: 0 }, p);
    const lHip = mapPt({ x: kp.leftHip?.x || 270, y: kp.leftHip?.y || 350, confidence: 0 }, p);
    const rHip = mapPt({ x: kp.rightHip?.x || 370, y: kp.rightHip?.y || 350, confidence: 0 }, p);

    const shoulderMidX = (lShoulder.x + rShoulder.x) / 2;
    const shoulderMidY = (lShoulder.y + rShoulder.y) / 2;
    const hipMidX = (lHip.x + rHip.x) / 2;
    const hipMidY = (lHip.y + rHip.y) / 2;

    const headHeight = shoulderMidY - nose.y;

    return [
      // Crown — above head
      { x: nose.x, y: nose.y - headHeight * 0.8 },
      // Third Eye — nose
      { x: nose.x, y: nose.y },
      // Throat — between nose and shoulders
      { x: lerp(nose.x, shoulderMidX, 0.6), y: lerp(nose.y, shoulderMidY, 0.5) },
      // Heart — shoulder midpoint
      { x: shoulderMidX, y: shoulderMidY },
      // Solar Plexus
      { x: lerp(shoulderMidX, hipMidX, 0.35), y: lerp(shoulderMidY, hipMidY, 0.35) },
      // Sacral
      { x: lerp(shoulderMidX, hipMidX, 0.68), y: lerp(shoulderMidY, hipMidY, 0.68) },
      // Root — hip midpoint
      { x: hipMidX, y: hipMidY },
    ];
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  // ─── Per-chakra alignment scores ─────────────────────────────────
  function getAlignmentScores(pose) {
    const kp = {};
    for (const k of pose.keypoints) if (k.score > 0.4) kp[k.part] = k.position;

    // ── Shoulder level ──────────────────────────────────────────────
    let shoulderScore = 0, shoulderTilt = 0;
    if (kp.leftShoulder && kp.rightShoulder) {
      const bw = Math.abs(kp.leftShoulder.x - kp.rightShoulder.x) || 100;
      // positive tilt → left shoulder higher (lower y in image coords)
      shoulderTilt = (kp.rightShoulder.y - kp.leftShoulder.y) / bw;
      shoulderScore = Math.max(0, 1 - Math.abs(shoulderTilt) / 0.28);
    }

    // ── Spine alignment (shoulder-mid ↔ hip-mid ↔ nose) ────────────
    let spineScore = 0, spineLean = 0;
    if (kp.nose && kp.leftShoulder && kp.rightShoulder && kp.leftHip && kp.rightHip) {
      const bw = Math.abs(kp.leftShoulder.x - kp.rightShoulder.x) || 100;
      const smx = (kp.leftShoulder.x + kp.rightShoulder.x) / 2;
      const hmx = (kp.leftHip.x + kp.rightHip.x) / 2;
      // positive lean → torso leaning right in PoseNet space
      spineLean = (smx - hmx) / bw;
      const noseLean = (kp.nose.x - smx) / bw;
      const totalDev = Math.abs(spineLean) + Math.abs(noseLean) * 0.5;
      spineScore = Math.max(0, 1 - totalDev / 0.35);
    }

    // ── Hip level ───────────────────────────────────────────────────
    let hipScore = 0;
    if (kp.leftHip && kp.rightHip) {
      const hw = Math.abs(kp.leftHip.x - kp.rightHip.x) || 100;
      const diff = Math.abs(kp.leftHip.y - kp.rightHip.y);
      hipScore = Math.max(0, 1 - diff / (hw * 0.28));
    }

    // ── Per-chakra weights ──────────────────────────────────────────
    // [crown, thirdEye, throat, heart, solarPlexus, sacral, root]
    const chakraScores = [
      spineScore * 0.85 + shoulderScore * 0.15,
      spineScore * 0.90 + shoulderScore * 0.10,
      spineScore * 0.65 + shoulderScore * 0.35,
      spineScore * 0.35 + shoulderScore * 0.65,   // heart: shoulder-dominant
      spineScore * 0.45 + shoulderScore * 0.30 + hipScore * 0.25,
      spineScore * 0.30 + hipScore * 0.70,
      spineScore * 0.20 + hipScore * 0.80,         // root: hip-dominant
    ];

    return { chakraScores, shoulderScore, spineScore, hipScore, shoulderTilt, spineLean };
  }

  // ─── Alignment guides drawn on canvas ────────────────────────────
  function drawAlignmentGuides(p, pose, align) {
    const kp = {};
    for (const k of pose.keypoints) if (k.score > 0.4) kp[k.part] = mapPt(k.position, p);
    if (!kp.nose || !kp.leftShoulder || !kp.rightShoulder) return;

    const smx = (kp.leftShoulder.x + kp.rightShoulder.x) / 2;
    const smy = (kp.leftShoulder.y + kp.rightShoulder.y) / 2;
    const hmx = kp.leftHip ? (kp.leftHip.x + (kp.rightHip?.x || kp.leftHip.x)) / 2 : smx;
    const hmy = kp.leftHip ? (kp.leftHip.y + (kp.rightHip?.y || kp.leftHip.y)) / 2 : smy + 120;

    // ── Spine guide line ─────────────────────────────────────────
    const spineGood = smoothSpine > 0.65;
    const spineCol = spineGood ? [80, 255, 160] : [255, 140, 60];
    const spineAlpha = 50 + smoothSpine * 80;
    p.stroke(spineCol[0], spineCol[1], spineCol[2], spineAlpha);
    p.strokeWeight(1);
    p.drawingContext.setLineDash([6, 6]);
    p.line(kp.nose.x, kp.nose.y - 20, hmx, hmy + 20);
    p.drawingContext.setLineDash([]);

    // ── Shoulder level bar ────────────────────────────────────────
    const shGood = smoothShoulder > 0.65;
    const shCol  = shGood ? [80, 255, 160] : [255, 140, 60];
    const shAlpha = 50 + smoothShoulder * 80;
    p.stroke(shCol[0], shCol[1], shCol[2], shAlpha);
    p.strokeWeight(1.5);
    p.line(kp.leftShoulder.x, kp.leftShoulder.y, kp.rightShoulder.x, kp.rightShoulder.y);

    // Tilt arrow on higher shoulder
    if (!shGood && Math.abs(smoothShoulderTilt) > 0.05) {
      const higher = smoothShoulderTilt > 0 ? kp.leftShoulder : kp.rightShoulder;
      const dir    = smoothShoulderTilt > 0 ? -1 : 1;
      p.stroke(255, 120, 60, 180);
      p.strokeWeight(2);
      p.line(higher.x, higher.y - 12, higher.x + dir * 14, higher.y - 22);
      p.line(higher.x + dir * 14, higher.y - 22, higher.x + dir * 8, higher.y - 22);
      p.line(higher.x + dir * 14, higher.y - 22, higher.x + dir * 14, higher.y - 16);
    }

    // ── Hip level bar ─────────────────────────────────────────────
    if (kp.leftHip && kp.rightHip) {
      const hipGood = smoothHip > 0.65;
      const hipCol  = hipGood ? [80, 255, 160] : [255, 140, 60];
      p.stroke(hipCol[0], hipCol[1], hipCol[2], 40 + smoothHip * 60);
      p.strokeWeight(1.2);
      p.line(kp.leftHip.x, kp.leftHip.y, kp.rightHip.x, kp.rightHip.y);
    }

    p.noStroke();
  }

  // ─── Pose status text ─────────────────────────────────────────────
  function updatePoseStatus(align) {
    const msgs = [];
    if (smoothShoulder < 0.5) {
      msgs.push(smoothShoulderTilt > 0 ? '← 왼쪽 어깨를 내려주세요' : '오른쪽 어깨를 내려주세요 →');
    }
    if (smoothSpine < 0.5) {
      msgs.push(smoothSpineLean > 0 ? '→ 몸이 오른쪽으로 기울었습니다' : '← 몸이 왼쪽으로 기울었습니다');
    }
    if (meditationScore > 0.75) {
      document.getElementById('pose-status').textContent = '✨ 차크라가 열리고 있습니다';
    } else if (msgs.length > 0) {
      document.getElementById('pose-status').textContent = msgs[0];
    } else {
      document.getElementById('pose-status').textContent = '🧘 자세를 유지하세요';
    }
  }

  // ─── Draw skeleton ───────────────────────────────────────────────
  function drawSkeleton(p, pose) {
    const kp = {};
    for (const k of pose.keypoints) {
      if (k.score > 0.4) kp[k.part] = mapPt(k.position, p);
    }

    const connections = [
      ['nose','leftEye'],['nose','rightEye'],
      ['leftShoulder','rightShoulder'],
      ['leftShoulder','leftElbow'],['leftElbow','leftWrist'],
      ['rightShoulder','rightElbow'],['rightElbow','rightWrist'],
      ['leftShoulder','leftHip'],['rightShoulder','rightHip'],
      ['leftHip','rightHip'],
      ['leftHip','leftKnee'],['leftKnee','leftAnkle'],
      ['rightHip','rightKnee'],['rightKnee','rightAnkle'],
    ];

    p.stroke(120, 80, 200, 80);
    p.strokeWeight(1.5);
    for (const [a, b] of connections) {
      if (kp[a] && kp[b]) {
        p.line(kp[a].x, kp[a].y, kp[b].x, kp[b].y);
      }
    }
    p.noStroke();
  }

  // ─── Draw chakras — each one reacts to its own alignment score ───
  function drawChakras(p, positions) {
    const t = p.frameCount;

    for (let i = 0; i < CHAKRAS.length; i++) {
      const ch  = CHAKRAS[i];
      const pos = positions[i];
      const act = chakraActivations[i]; // 0–1

      // Pulse only beats when activated
      const pulse      = 0.5 + 0.5 * Math.sin(t * 0.04 + i * 0.9);
      const breathMod  = 0.6 + 0.4 * breathPhase;
      const totalPulse = pulse * breathMod * Math.max(0.08, act);

      // Dormant: small grey dot. Active: full color with glow.
      const baseR = 6 + act * 10;
      const glowR = (10 + act * 35) * totalPulse;

      if (act > 0.08) {
        // Glow layers — intensity scales with activation
        for (let g = 4; g >= 0; g--) {
          const alpha = act * (8 + g * 12) * totalPulse;
          p.fill(ch.glow[0], ch.glow[1], ch.glow[2], alpha);
          p.ellipse(pos.x, pos.y, (glowR + g * 6) * 2, (glowR + g * 6) * 2);
        }
        // Core
        p.fill(ch.color[0], ch.color[1], ch.color[2], 120 + act * 135);
        p.ellipse(pos.x, pos.y, baseR * 2, baseR * 2);
        // Highlight
        p.fill(255, 255, 255, act * 130 * pulse);
        p.ellipse(pos.x - baseR * 0.25, pos.y - baseR * 0.25, baseR * 0.55, baseR * 0.55);
      } else {
        // Dormant — dim grey pulse
        const dimPulse = 0.3 + 0.15 * Math.sin(t * 0.025 + i);
        p.fill(80, 70, 100, 120 * dimPulse);
        p.ellipse(pos.x, pos.y, 10, 10);
        p.fill(120, 110, 150, 80 * dimPulse);
        p.ellipse(pos.x, pos.y, 18, 18);
      }
    }
  }

  // ─── Draw aura around the body ───────────────────────────────────
  function drawAura(p, pose, score) {
    const kp = {};
    for (const k of pose.keypoints) {
      if (k.score > 0.4) kp[k.part] = mapPt(k.position, p);
    }
    if (!kp.nose || !kp.leftHip) return;

    const cx = kp.nose.x;
    const cy = (kp.nose.y + (kp.leftHip ? kp.leftHip.y : kp.nose.y + 200)) / 2;
    const h = Math.abs((kp.leftHip ? kp.leftHip.y : kp.nose.y + 200) - kp.nose.y);
    const t = p.frameCount * 0.012;
    const alpha = 8 + score * 15;

    for (let layer = 0; layer < 4; layer++) {
      const r = (h * 0.55 + layer * 15) * (0.9 + 0.1 * Math.sin(t + layer));
      const hue = (t * 30 + layer * 25) % 360;
      // Convert HSL-ish to RGB manually for the aura
      const colors = [
        [138, 43, 226], [75, 0, 130], [0, 100, 200], [0, 180, 120]
      ];
      const c = colors[layer % colors.length];
      p.fill(c[0], c[1], c[2], alpha * (1 - layer * 0.2));
      p.ellipse(cx, cy, r * 1.1, r * 1.6);
    }
  }

  // ─── Particles — only emit from activated chakras ────────────────
  function emitParticles(p, chakraPositions) {
    for (let i = 0; i < CHAKRAS.length; i++) {
      const act = chakraActivations[i];
      if (act < 0.55) continue;
      // More activation → more frequent emission
      const rate = Math.floor(p.map(act, 0.55, 1, 8, 2));
      if (p.frameCount % rate !== 0) continue;
      const ch  = CHAKRAS[i];
      const pos = chakraPositions[i];
      particles.push({
        x: pos.x + p.random(-8, 8),
        y: pos.y + p.random(-8, 8),
        vx: p.random(-0.6, 0.6),
        vy: p.random(-2.2, -0.4),
        life: 1,
        decay: p.random(0.007, 0.018),
        r: p.random(2, 4 + act * 3),
        color: ch.glow,
      });
    }
    if (particles.length > 350) particles.splice(0, particles.length - 350);
  }

  function updateParticles(p) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy -= 0.01;
      pt.life -= pt.decay;
      if (pt.life <= 0) { particles.splice(i, 1); continue; }
      p.fill(pt.color[0], pt.color[1], pt.color[2], pt.life * 180);
      p.ellipse(pt.x, pt.y, pt.r * pt.life * 2, pt.r * pt.life * 2);
    }
  }

  // ─── Breathing guide ring ────────────────────────────────────────
  function drawBreathingGuide(p) {
    const cx = 70, cy = p.height - 70;
    const maxR = 35, minR = 20;
    const r = minR + (maxR - minR) * breathPhase;
    const label = breathIn ? '들숨' : '날숨';

    // Outer ring
    p.stroke(124, 58, 237, 60);
    p.strokeWeight(1);
    p.noFill();
    p.ellipse(cx, cy, maxR * 2 + 10, maxR * 2 + 10);

    // Breathing ring
    p.strokeWeight(2.5);
    p.stroke(167, 139, 250, 180);
    p.ellipse(cx, cy, r * 2, r * 2);
    p.noStroke();

    // Inner fill
    p.fill(124, 58, 237, 30 + breathPhase * 50);
    p.ellipse(cx, cy, r * 2, r * 2);

    // Label
    p.fill(196, 181, 253, 200);
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(11);
    p.textFont('sans-serif');
    p.text(label, cx, cy);

    // Session label
    p.fill(109, 72, 200, 150);
    p.textSize(9);
    p.text('호흡 가이드', cx, cy + maxR + 12);
  }
};

// ─── Timer update ─────────────────────────────────────────────────────
function updateTimer() {
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('session-timer').textContent = `${m}:${s}`;
}

// ─── Boot ─────────────────────────────────────────────────────────────
new p5(sketch, document.getElementById('canvas-container'));
</script>
